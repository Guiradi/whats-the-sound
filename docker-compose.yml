# Production — docker compose up --build
#
# Requires a .env file at the repo root.
# Copy .env.example to .env and fill in the Supabase credentials.
#
# NEXT_PUBLIC_* vars are baked into the web image at build time.
# Rebuild the image (--build) whenever these values change.

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        # Resolved from .env by docker compose
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3001}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
